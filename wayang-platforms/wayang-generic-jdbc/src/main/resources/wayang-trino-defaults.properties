# Connection (override per deployment in wayang.properties)
# wayang.trino.jdbc.url      = jdbc:trino://localhost:8080
# wayang.trino.jdbc.user     = admin
# wayang.trino.jdbc.password =
wayang.trino.jdbc.driverName = io.trino.jdbc.TrinoDriver

# Hardware profile used by LoadProfileToTimeConverter.
# Trino runs as a distributed cluster; model a representative coordinator node.
wayang.trino.cpu.mhz  = 2700
wayang.trino.cores    = 4
wayang.trino.costs.fix    = 0.0
wayang.trino.costs.per-ms = 1.0

# ── Cost model ────────────────────────────────────────────────────────────────
#
# Formula: cpu = α * rows + β
#
# Trino is a distributed MPP engine: very low per-row cost (small α) because
# scans are parallelised across workers, but noticeable fixed overhead (larger β)
# from query planning and cluster coordination.
#
# Compared to a single-node source (Postgres α=55, β=380k):
#   α  = 10  — parallel scan makes per-row cost ~5× cheaper
#   β  = 800k — cluster startup + query dispatch overhead
#
# These are initial estimates; tune after real benchmarks by fitting the
# template formula below on measured data and updating the 'load' key.
# ──────────────────────────────────────────────────────────────────────────────

wayang.trino.tablesource.load.template = {\
  "type":"mathex", "in":0, "out":1,\
  "cpu":"?*out0 + ?",\
  "ram":"0",\
  "p":0.9\
}
wayang.trino.tablesource.load = {\
  "in":0, "out":1,\
  "cpu":"${10*out0 + 800000}",\
  "ram":"0",\
  "p":0.9\
}

wayang.trino.filter.load.template = {\
  "type":"mathex", "in":1, "out":1,\
  "cpu":"?*in0 + ?",\
  "ram":"0",\
  "p":0.9\
}
wayang.trino.filter.load = {\
  "in":1, "out":1,\
  "cpu":"${10*in0 + 800000}",\
  "ram":"0",\
  "p":0.9\
}

wayang.trino.projection.load.template = {\
  "type":"mathex", "in":1, "out":1,\
  "cpu":"?*in0 + ?",\
  "ram":"0",\
  "p":0.9\
}
wayang.trino.projection.load = {\
  "in":1, "out":1,\
  "cpu":"${10*in0 + 800000}",\
  "ram":"0",\
  "p":0.9\
}

wayang.trino.sqltostream.load.query.template = {\
  "type":"mathex", "in":1, "out":1,\
  "cpu":"?*out0 + ?"\
}
wayang.trino.sqltostream.load.query = {\
  "in":1, "out":1,\
  "cpu":"${10*out0 + 800000}",\
  "ram":"0",\
  "p":0.9\
}
wayang.trino.sqltostream.load.output.template = {\
  "type":"mathex", "in":1, "out":1,\
  "cpu":"?*out0"\
}
wayang.trino.sqltostream.load.output = {\
  "in":1, "out":1,\
  "cpu":"${10*out0}",\
  "ram":"0",\
  "p":0.9\
}
