# Iceberg catalog backed by Hive Metastore (HMS) + MinIO (S3 storage).
# HMS stores Iceberg table metadata; Trino writes Parquet files to MinIO via S3.
connector.name=iceberg
iceberg.catalog.type=hive_metastore
hive.metastore.uri=thrift://metastore:9083

# Native S3 filesystem — handles both s3:// and s3a:// (which HMS uses internally).
# This avoids the "No FileSystem for scheme s3" error when HMS assigns locations.
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.region=us-east-1

iceberg.file-format=PARQUET
